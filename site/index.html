<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>POME Nest</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'sans-serif'],
          },
          colors: {
            brand: {
              canvas: '#E6E8E1', /* Светлый фон */
              ink: '#1A1A1A', /* Основной темный текст */
              surface: '#FFFFFF', /* Белые карточки */
              primary: '#0B4AFA', /* Синий для кнопок и ссылок */
              muted: '#6B7280', /* Серый текст (субтитры, описание) */
              line: '#D1D5DB' /* Линии/Бордеры */
            }
          },
          maxWidth: {
            content: '1280px'
          },
          borderRadius: {
            '2xl': '1rem',
            '3xl': '1.5rem',
            '4xl': '2rem',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-brand-canvas text-brand-ink font-sans antialiased">
  <div id="app"></div>
  <script type="module" src="./app.js"></script>
</body>
</html>
